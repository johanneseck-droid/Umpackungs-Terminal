<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
  
    function App() {
      const [suchbegriff, setSuchbegriff] = useState('');
      const [ergebnis, setErgebnis] = useState(null);
      const [fehlerNummer, setFehlerNummer] = useState(null);
      const [wirdGeladen, setWirdGeladen] = useState(false);
      const inputRef = useRef(null);

      const [isEditing, setIsEditing] = useState(false);
      // showPinModal kann jetzt false, 'edit' oder 'create' sein
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinInput, setPinInput] = useState('');
      const [editData, setEditData] = useState({});
      const [isSaving, setIsSaving] = useState(false);

      useEffect(() => {
        if (!isEditing && !showPinModal) {
            inputRef.current?.focus();
        }
      }, [isEditing, showPinModal]);

      const handleGlobalKeyDown = (e) => {
        if (isEditing || showPinModal) return; 
        if (document.activeElement === inputRef.current) return;
        if (e.ctrlKey || e.altKey || e.metaKey || e.key.length > 1) return;
        
        e.preventDefault(); 
        inputRef.current?.focus();
        setSuchbegriff(prev => prev + e.key);
      };

      useEffect(() => {
        window.addEventListener('keydown', handleGlobalKeyDown);
        return () => window.removeEventListener('keydown', handleGlobalKeyDown);
      }, [isEditing, showPinModal]);

      const handleSuche = (e, forcedText = null) => {
        if (e) e.preventDefault();
        let suchText = forcedText || suchbegriff.trim();
        if (!suchText) return;

        if (suchText.length > 11 && !forcedText) {
           suchText = suchText.substring(3, 14);
        }

        setWirdGeladen(true);
        setErgebnis(null);
        setFehlerNummer(null);
        setSuchbegriff(suchText);

        google.script.run
          .withSuccessHandler((response) => {
             setWirdGeladen(false);
             if (response.found) {
                setErgebnis(response.data);
                setSuchbegriff(''); 
             } else {
                setFehlerNummer(suchText);
                setSuchbegriff(''); 
             }
             setTimeout(() => inputRef.current?.focus(), 50);
          })
          .withFailureHandler((error) => {
             setWirdGeladen(false);
             alert("Verbindungsfehler zur Google Tabelle: " + error);
             setTimeout(() => inputRef.current?.focus(), 50);
          })
          .sucheMaterial(suchText);
      };

      const resetScanner = () => {
        setErgebnis(null);
        setFehlerNummer(null);
        setSuchbegriff('');
        setIsEditing(false);
        setTimeout(() => inputRef.current?.focus(), 50);
      };
    
      const handlePinSubmit = (e) => {
        e.preventDefault();
        if (pinInput === '1234') {
            const action = showPinModal;
            setShowPinModal(false);
            setPinInput('');
            
            if (action === 'create') {
                startCreatingNew();
            } else {
                startEditing();
            }
        } else {
            alert('Falscher PIN!');
            setPinInput('');
        }
      };

      const startEditing = () => {
        setEditData({
            materialnummer: ergebnis.materialnummer,
            bezeichnung: ergebnis.bezeichnung || '',
            umpackanweisung: ergebnis.umpackanweisung || '',
            besonderes: ergebnis.besonderes || '',
            zielbehaelter: ergebnis.zielbehaelter || '',
            fuellmenge: ergebnis.fuellmenge || '',
            bild1Url: ergebnis.bild1Url,
            bild2Url: ergebnis.bild2Url,
            bild1Base64: null,
            bild2Base64: null,
            deleteBild1: false,
            deleteBild2: false,
            isNew: false
        });
        setIsEditing(true);
      };

      const startCreatingNew = () => {
        setEditData({
            materialnummer: fehlerNummer, // Übernimmt die gescannte, nicht gefundene Nummer
            bezeichnung: '',
            umpackanweisung: '',
            besonderes: '',
            zielbehaelter: '',
            fuellmenge: '',
            bild1Url: null,
            bild2Url: null,
            bild1Base64: null,
            bild2Base64: null,
            deleteBild1: false,
            deleteBild2: false,
            isNew: true
        });
        // Dummy-Ergebnis für die Dropdown-Optionen
        setErgebnis({
            dropdownOptions: ["Nicht auspacken", "ESD-Ware", "Karton bündig schneiden", "Als L10 weitergeben", "Deckel"],
            behaelterOptions: ["A20", "A30", "A40", "E10", "E15", "E20", "E25", "E30", "E40", "E50"]
        });
        setIsEditing(true);
        setFehlerNummer(null);
      };

      const handleDeleteImage = (targetField) => {
        setEditData(prev => ({
            ...prev,
            [targetField + 'Url']: null,
            [targetField + 'Base64']: null,
            // Dem Backend mitteilen, dass das Bild physisch gelöscht werden soll
            ['delete' + targetField.charAt(0).toUpperCase() + targetField.slice(1)]: true 
        }));
      };

      const handleImageUpload = (e, targetField) => {
        const file = e.target.files[0];
        if (!file) return;

        const localPreviewUrl = URL.createObjectURL(file);
        setEditData(prev => ({ 
            ...prev, 
            [targetField + 'Url']: localPreviewUrl,
            // Wenn ein neues Bild hochgeladen wird, das Löschen-Flag wieder entfernen
            ['delete' + targetField.charAt(0).toUpperCase() + targetField.slice(1)]: false
        }));

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200; 
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width;
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);
            setEditData(prev => ({ ...prev, [targetField + 'Base64']: compressedBase64 }));
          };
        };
      };

      const saveChanges = () => {
        setIsSaving(true);
        google.script.run
          .withSuccessHandler((response) => {
             setIsSaving(false);
             if(response.success) {
                setIsEditing(false);
                handleSuche(null, editData.materialnummer); 
             } else {
                alert("Fehler beim Speichern: " + response.error);
             }
          })
          .withFailureHandler((error) => {
             setIsSaving(false);
             alert("Verbindungsfehler: " + error);
          })
          .saveMaterialUpdate(editData);
      };

      // Toggle-Funktion für die Buttons (Besonderes)
      const toggleEigenschaft = (optionText) => {
        const currentSelections = (editData.besonderes || "").split(',').map(s => s.trim()).filter(Boolean);
        let newSelections;

        if (currentSelections.includes(optionText)) {
            newSelections = currentSelections.filter(item => item !== optionText);
        } else {
            newSelections = [...currentSelections, optionText];
        }
        
        setEditData({...editData, besonderes: newSelections.join(', ')});
      };

      const renderBesonderes = (text) => {
        if (!text) return null;
        const eigenschaften = text.split(',').map(s => s.trim()).filter(s => s !== "");
        if (eigenschaften.length === 0) return null;
        return (
          <div className="flex flex-wrap gap-3 p-4 bg-amber-50 border-b border-amber-100">
            {eigenschaften.map((eigenschaft, index) => (
              <div key={index} className="flex items-center gap-2 text-amber-900 font-semibold bg-white px-4 py-2 rounded-full border-2 border-amber-300 shadow-sm text-lg">
                ✅ {eigenschaft}
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto relative">
            
            {/* --- PIN MODAL --- */}
            {showPinModal && (
                <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 z-[100]">
                    <div className="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full border-t-8 border-blue-600">
                        <h2 className="text-2xl font-bold mb-4">
                            {showPinModal === 'create' ? "Material anlegen entsperren" : "Bearbeitung entsperren"}
                        </h2>
                        <form onSubmit={handlePinSubmit}>
                            <input 
                                type="password" 
                                autoFocus
                                placeholder="PIN eingeben..."
                                className="w-full text-center tracking-widest text-3xl p-4 border-2 border-slate-300 rounded-lg mb-6 focus:border-blue-600 outline-none"
                                value={pinInput}
                                onChange={(e) => setPinInput(e.target.value)}
                            />
                            <div className="flex gap-4">
                                <button type="button" onClick={() => setShowPinModal(false)} className="flex-1 px-4 py-3 bg-slate-200 hover:bg-slate-300 rounded-lg font-bold text-slate-700">Abbrechen</button>
                                <button type="submit" className="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-white">Prüfen</button>
                            </div>
                        </form>
                    </div>
                </div>
            )}

            <div className={`bg-white shadow-xl rounded-xl border border-slate-200 overflow-hidden ${isEditing ? 'ring-4 ring-blue-400' : ''}`}>
              
              <div className="border-l-8 border-blue-600 p-5 md:p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="w-full md:w-auto">
                  <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">📦 Umpackungs-Terminal</h1>
                  <p className="text-slate-500 text-sm mt-1">Barcode scannen oder Materialnummer eingeben</p>
                </div>

                <div className="w-full md:w-1/2 max-w-xl">
                  <form onSubmit={handleSuche} className="relative">
                    <input
                      ref={inputRef}
                      type="text"
                      className="block w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-lg text-lg font-mono focus:ring-0 focus:border-blue-500 outline-none disabled:opacity-50"
                      placeholder="🔍 Barcode scannen..."
                      value={suchbegriff}
                      onChange={(e) => setSuchbegriff(e.target.value)}
                      autoComplete="off"
                      disabled={wirdGeladen || isEditing}
                    />
                    <button 
                      type="submit" 
                      disabled={wirdGeladen || isEditing}
                      className="absolute inset-y-1.5 right-1.5 bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-md text-base font-semibold disabled:bg-slate-400 transition-colors"
                    >
                      {wirdGeladen ? "Sucht..." : "Suchen"}
                    </button>
                  </form>
                </div>
              </div>

              {wirdGeladen && (
                <div className="flex flex-col items-center justify-center p-12 bg-white border-t border-slate-200">
                  <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mb-4"></div>
                  <h3 className="text-xl font-bold text-slate-700">Lade Daten...</h3>
                </div>
              )}

              {fehlerNummer && !wirdGeladen && (
                <div className="bg-red-50 border-l-8 border-red-600 border-t border-slate-200 p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                  <div className="flex items-center gap-6">
                      <div className="text-6xl">⚠️</div>
                      <div>
                        <h3 className="text-red-900 font-bold text-2xl mb-2">Material nicht gefunden!</h3>
                        <p className="text-red-800 text-xl">
                          Keine Anleitung zu Materialnummer <strong className="font-mono bg-red-200 px-2 py-1 rounded">{fehlerNummer}</strong>.
                        </p>
                      </div>
                  </div>
                  
                  {/* Button zum Anlegen eines komplett neuen Materials */}
                  <button 
                      onClick={() => setShowPinModal('create')} 
                      className="whitespace-nowrap px-6 py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl text-xl shadow-lg transition-transform hover:scale-105 flex items-center gap-2"
                  >
                      ➕ Neues Material anlegen
                  </button>
                </div>
              )}

              {ergebnis && !wirdGeladen && (
                <div className="bg-white border-t border-slate-200">
                  
                  {(!ergebnis.pdfName || !ergebnis.pdfEmbedUrl || isEditing) && (
                    <div className="bg-slate-800 text-white py-4 px-6 flex justify-between items-center">
                      <div>
                        <div className="text-slate-400 text-sm font-bold tracking-wider uppercase">
                            {editData.isNew ? "Neues Material anlegen" : "Materialnummer"}
                        </div>
                        <div className="text-3xl font-mono font-bold mt-1">{isEditing ? editData.materialnummer : ergebnis.materialnummer}</div>
                      </div>
                      <div className="text-right">
                        <div className="text-slate-400 text-sm font-bold tracking-wider uppercase">Bezeichnung</div>
                        <div className="text-2xl font-bold mt-1">{isEditing ? (editData.bezeichnung || '---') : ergebnis.bezeichnung}</div>
                      </div>
                    </div>
                  )}

                  {/* ========================================================================= */}
                  {/* EDIT MODE (BEARBEITEN / NEU ANLEGEN) */}
                  {/* ========================================================================= */}
                  {isEditing ? (
                      <div className="bg-blue-50/50 p-6">
                        <div className="grid md:grid-cols-4 gap-8">
                            
                            <div className="md:col-span-1 space-y-6">
                                {/* Bezeichnung bearbeiten */}
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">Bezeichnung</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-3 border-2 border-slate-300 rounded-lg text-lg focus:border-blue-500 outline-none" 
                                        placeholder="Name des Materials..."
                                        value={editData.bezeichnung}
                                        onChange={e => setEditData({...editData, bezeichnung: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">Zielbehälter</label>
                                    <select 
                                        className="w-full p-3 border-2 border-slate-300 rounded-lg text-xl font-bold focus:border-blue-500 outline-none bg-white cursor-pointer" 
                                        value={editData.zielbehaelter}
                                        onChange={e => setEditData({...editData, zielbehaelter: e.target.value})}
                                    >
                                        <option value="">-- Bitte wählen --</option>
                                        {(ergebnis.behaelterOptions || ["A20", "A30", "A40", "E10", "E15", "E20", "E25", "E30", "E40", "E50"]).map(opt => (
                                            <option key={opt} value={opt}>{opt}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">Füllmenge</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-3 border-2 border-slate-300 rounded-lg text-lg focus:border-blue-500 outline-none" 
                                        placeholder="z.B. 50"
                                        value={editData.fuellmenge}
                                        onChange={e => setEditData({...editData, fuellmenge: e.target.value})}
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">Besonderes (Eigenschaften antippen)</label>
                                    <div className="flex flex-wrap gap-2">
                                        {Array.from(new Set([...(ergebnis.dropdownOptions || ["Nicht auspacken", "ESD-Ware", "Karton bündig schneiden", "Als L10 weitergeben"]), "Deckel"])).map(opt => {
                                            const currentSelections = (editData.besonderes || "").split(',').map(s => s.trim()).filter(Boolean);
                                            const isSelected = currentSelections.includes(opt);
                                            return (
                                                <button
                                                    key={opt}
                                                    type="button"
                                                    onClick={() => toggleEigenschaft(opt)}
                                                    className={`px-4 py-2 text-left rounded-xl font-bold border-2 transition-all flex items-center gap-2 w-full ${isSelected ? 'bg-amber-100 border-amber-500 text-amber-900 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:border-slate-400'}`}
                                                >
                                                    {isSelected ? <span>✅</span> : <span className="opacity-30">⬜</span>}
                                                    {opt}
                                                </button>
                                            )
                                        })}
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">Umpack-Anweisung</label>
                                    <textarea 
                                        className="w-full p-4 border-2 border-slate-300 rounded-lg text-lg focus:border-blue-500 outline-none min-h-[200px]" 
                                        placeholder="Anweisung hier eintippen..."
                                        value={editData.umpackanweisung}
                                        onChange={e => setEditData({...editData, umpackanweisung: e.target.value})}
                                    />
                                </div>
                            </div>

                            <div className="md:col-span-3">
                                <h3 className="text-xl font-bold text-slate-800 mb-4 border-b-2 border-slate-200 pb-2">Bilder aktualisieren:</h3>
                                <div className="grid grid-cols-2 gap-6">
                                    
                                    <div className="flex flex-col gap-3">
                                        <div className="font-bold text-slate-600 text-center bg-slate-200 p-2 rounded-t-lg">Bild 1 (Wird als {editData.materialnummer}_1.jpg gespeichert)</div>
                                        <div className="border-4 border-dashed border-slate-300 rounded-b-lg bg-slate-50 aspect-square overflow-hidden flex items-center justify-center relative group">
                                            {editData.bild1Url ? (
                                                <>
                                                    <img src={editData.bild1Url} className="w-full h-full object-contain bg-white" />
                                                    {/* Löschen Button */}
                                                    <button type="button" onClick={() => handleDeleteImage('bild1')} className="absolute top-3 right-3 bg-red-500 hover:bg-red-700 text-white p-3 rounded-full shadow-lg transition-transform hover:scale-110" title="Bild löschen">
                                                        🗑️
                                                    </button>
                                                </>
                                            ) : <span className="text-slate-400">Kein Bild 1</span>}
                                        </div>
                                        <div className="flex flex-col xl:flex-row gap-2 mt-2">
                                            <label className="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-800 border border-blue-300 text-center font-bold py-3 px-2 rounded cursor-pointer transition-colors">
                                                📸 Foto machen
                                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(e, 'bild1')} />
                                            </label>
                                            <label className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 border border-slate-400 text-center font-bold py-3 px-2 rounded cursor-pointer transition-colors">
                                                📁 Hochladen
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, 'bild1')} />
                                            </label>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-3">
                                        <div className="font-bold text-slate-600 text-center bg-slate-200 p-2 rounded-t-lg">Bild 2 (Wird als {editData.materialnummer}_2.jpg gespeichert)</div>
                                        <div className="border-4 border-dashed border-slate-300 rounded-b-lg bg-slate-50 aspect-square overflow-hidden flex items-center justify-center relative group">
                                            {editData.bild2Url ? (
                                                <>
                                                    <img src={editData.bild2Url} className="w-full h-full object-contain bg-white" />
                                                    {/* Löschen Button */}
                                                    <button type="button" onClick={() => handleDeleteImage('bild2')} className="absolute top-3 right-3 bg-red-500 hover:bg-red-700 text-white p-3 rounded-full shadow-lg transition-transform hover:scale-110" title="Bild löschen">
                                                        🗑️
                                                    </button>
                                                </>
                                            ) : <span className="text-slate-400">Kein Bild 2</span>}
                                        </div>
                                        <div className="flex flex-col xl:flex-row gap-2 mt-2">
                                            <label className="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-800 border border-blue-300 text-center font-bold py-3 px-2 rounded cursor-pointer transition-colors">
                                                📸 Foto machen
                                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(e, 'bild2')} />
                                            </label>
                                            <label className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 border border-slate-400 text-center font-bold py-3 px-2 rounded cursor-pointer transition-colors">
                                                📁 Hochladen
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, 'bild2')} />
                                            </label>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div className="mt-8 flex justify-end gap-4 border-t-2 border-slate-300 pt-6">
                            <button onClick={() => setIsEditing(false)} disabled={isSaving} className="px-6 py-3 bg-white border-2 border-slate-400 hover:bg-slate-100 text-slate-700 font-bold rounded-lg text-lg">
                                Abbrechen
                            </button>
                            <button onClick={saveChanges} disabled={isSaving} className="px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg text-lg flex items-center gap-2">
                                {isSaving ? <span className="animate-pulse">💾 Speichere...</span> : "💾 Änderungen speichern"}
                            </button>
                        </div>
                      </div>
                  ) : (
                  
                  /* ========================================================================= */
                  /* ANZEIGE MODE (NORMAL) */
                  /* ========================================================================= */
                    ergebnis.pdfName && ergebnis.pdfEmbedUrl ? (
                      <div className="p-6">
                        <div className="w-full bg-slate-200 rounded-lg overflow-hidden border-2 border-slate-300 h-[800px]">
                          <iframe src={ergebnis.pdfEmbedUrl} className="w-full h-full" title="PDF Ansicht"></iframe>
                        </div>
                      </div>
                    ) : (
                      <div>
                        {renderBesonderes(ergebnis.besonderes)}

                        <div className="p-8 grid md:grid-cols-4 gap-8">
                          
                          <div className="md:col-span-1">
                            <div className="flex items-center gap-3 mb-4 border-b-2 border-slate-200 pb-2">
                              {ergebnis.zielbehaelter && (
                                <div className="w-16 h-16 flex-shrink-0 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-md border-2 border-indigo-800">
                                  <span className="text-2xl font-black">{ergebnis.zielbehaelter}</span>
                                </div>
                              )}
                              <div>
                                <h3 className="text-xl xl:text-2xl font-bold text-slate-800 leading-tight">
                                  Umpack-Anweisung:
                                </h3>
                              </div>
                            </div>

                            <div className="bg-blue-50 p-6 rounded-xl border-2 border-blue-200 shadow-sm whitespace-pre-line text-lg md:text-xl leading-relaxed text-slate-800 min-h-[300px]">
                              {ergebnis.umpackanweisung || <span className="text-slate-400 italic font-normal text-base">Keine Anweisung hinterlegt.</span>}
                            </div>
                          </div>

                          <div className="md:col-span-3">
                            <div className="grid grid-cols-2 gap-6">
                              <div className="border-2 border-dashed border-slate-300 rounded-lg p-2 bg-slate-50 aspect-square flex flex-col items-center justify-center overflow-hidden">
                                {ergebnis.bild1Url ? (
                                  <img src={ergebnis.bild1Url} className="w-full h-full object-contain rounded-md" alt="Bild 1" />
                                ) : (
                                  <span className="text-slate-400 text-center text-sm font-medium">Kein Bild 1 gefunden</span>
                                )}
                              </div>
                              <div className="border-2 border-dashed border-slate-300 rounded-lg p-2 bg-slate-50 aspect-square flex flex-col items-center justify-center overflow-hidden">
                                {ergebnis.bild2Url ? (
                                  <img src={ergebnis.bild2Url} className="w-full h-full object-contain rounded-md" alt="Bild 2" />
                                ) : (
                                  <span className="text-slate-400 text-center text-sm font-medium">Kein Bild 2 gefunden</span>
                                )}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )
                  )}
                  
                  {!isEditing && (
                    <div className="bg-slate-100 p-6 border-t border-slate-200 flex justify-between items-center">
                        <button onClick={() => setShowPinModal('edit')} className="flex items-center gap-2 text-blue-700 bg-white border-2 border-blue-300 hover:bg-blue-50 font-bold px-6 py-3 rounded-lg text-lg transition-colors">
                            ✏️ Anleitung bearbeiten
                        </button>
                        <button onClick={resetScanner} className="flex items-center gap-2 text-slate-600 hover:text-slate-900 font-bold px-6 py-3 bg-white border-2 border-slate-300 hover:bg-slate-200 rounded-lg text-lg transition-colors">
                            🔄 Nächster Scan
                        </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
